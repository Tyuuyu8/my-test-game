<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اربح بدون ايداع - Lucky Streak</title>
    <style>
        body {
            background: radial-gradient(circle, #4a0000 0%, #150000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .game-screen {
            width: 100%;
            max-width: 480px; 
            background: #000;
            border: 4px solid #333;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(255, 61, 0, 0.4);
            position: relative;
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.4em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3d00, 0 0 5px #ffeb3b;
            font-style: italic;
        }
        .balance-box {
            background: linear-gradient(180deg, #222 0%, #111 100%);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .balance-value {
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
        }
        .plus-btn {
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .slot-machine-frame {
            border: 4px solid #ff9800;
            border-radius: 12px;
            background: #111;
            padding: 8px;
            box-shadow: 0 0 20px #ff3d00, inset 0 0 15px #000;
            display: flex;
            justify-content: space-between;
            gap: 4px;
            overflow: hidden;
            position: relative;
        }

        .reel {
            flex: 1;
            height: 240px; 
            background: linear-gradient(180deg, #151515 0%, #050505 50%, #151515 100%);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border-right: 1px solid #222;
        }

        .symbols-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .symbol {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        
        .symbol.seven {
            color: #ff3d00;
            font-weight: bold;
            text-shadow: 0 0 15px #ff3d00, 0 0 5px #ffd700;
            animation: pulse 0.5s infinite alternate;
        }
        .symbol.diamond {
            text-shadow: 0 0 15px #00e5ff;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }

        .spin-outer-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9800 0%, #ff3d00 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px #ff3d00, 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .spin-outer-ring:active {
            transform: scale(0.95);
        }
        .spin-inner-circle {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1em;
            border: 3px solid #111;
        }
        
        .disabled-spin {
            background: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
        .disabled-spin .spin-inner-circle {
            background: #aaa;
            color: #555;
        }

        .bottom-info-bar {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid #333;
            padding: 8px 5px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #aaa;
            border-radius: 5px;
        }
        .info-item span {
            color: #ffd700;
            font-weight: bold;
        }

        #message-display {
            font-weight: bold;
            text-align: center;
            min-height: 1.5em;
            font-size: 1.1em;
            margin-top: 5px;
        }
        .win-text { color: #4caf50; text-shadow: 0 0 10px rgba(76,175,80,0.8); font-size: 1.2em; }
        .loss-text { color: #f44336; }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.12); }
        }
    </style>
</head>
<body>

    <div class="game-screen">
        <div class="top-navbar">
            <div class="game-title">Lucky Streak 🔥</div>
            <div class="balance-box">
                <span style="color:#ffd700; font-size:0.8em;">د.ع</span>
                <span class="balance-value" id="user-balance">1000</span>
                <button class="plus-btn">+</button>
            </div>
        </div>

        <div class="slot-machine-frame">
            <div class="reel"><div class="symbols-strip" id="strip1"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip2"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip3"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip4"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip5"></div></div>
        </div>

        <div id="message-display">اضغط لتدوير بكرات الحظ الصافية!</div>

        <div class="controls-panel">
            <div class="spin-outer-ring" id="spin-btn-container" onclick="startSpin()">
                <div class="spin-inner-circle">SPIN</div>
            </div>

            <div class="bottom-info-bar">
                <div class="info-item">BET: <span id="bet-val">10</span></div>
                <div class="info-item">LINES: <span>10</span></div>
                <div class="info-item">COIN VALUE: <span>$0.01</span></div>
            </div>
        </div>
    </div>

    <script>
        const SYMBOLS_POOL = ['🔥7', '💎', '💰', 'WILD', '🍒', '🍇', '🍊'];
        const SPIN_COST = 10;
        const SINGLE_HEIGHT = 60; 
        const VISIBLE_ROWS = 4;   
        const STRIP_ITEMS_COUNT = 30; 

        let currentBalance = 1000;
        let runningSpin = false;
        let audioCtx = null; // سيتم تفعيله مع أول ضغطة للاعب لالتزام الأمان ببعض المتصفحات
        let spinSoundInterval = null;

        const balanceDisplay = document.getElementById('user-balance');
        const messageDisplay = document.getElementById('message-display');
        const spinButtonContainer = document.getElementById('spin-btn-container');

        // دالة لتوليد صوت تكتكة تدوير البكرات
        function playTickSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(350, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.06);
        }

        // دالة لتوليد موسيقى الفوز الاحتفالية السلسة
        function playWinMelody() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // نغمات متتالية سريعة ومتناسقة تعطي شعور الفوز بالآركيد
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; 
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.08));
                
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (index * 0.08));
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.08) + 0.3);
                
                osc.start(audioCtx.currentTime + (index * 0.08));
                osc.stop(audioCtx.currentTime + (index * 0.08) + 0.3);
            });
        }

        function generateReelStrip(targetStrip, finalFourSymbols) {
            let html = '';
            for (let i = 0; i < STRIP_ITEMS_COUNT - VISIBLE_ROWS; i++) {
                const randSym = SYMBOLS_POOL[Math.floor(Math.random() * SYMBOLS_POOL.length)];
                if (randSym === '🔥7') html += `<div class="symbol seven">7</div>`;
                else if (randSym === '💎') html += `<div class="symbol diamond">💎</div>`;
                else html += `<div class="symbol">${randSym}</div>`;
            }
            finalFourSymbols.forEach(sym => {
                if (sym === '🔥7') html += `<div class="symbol seven">7</div>`;
                else if (sym === '💎') html += `<div class="symbol diamond">💎</div>`;
                else html += `<div class="symbol">${sym}</div>`;
            });
            targetStrip.innerHTML = html;
        }

        function initSlotMachine() {
            for (let r = 1; r <= 5; r++) {
                const stripElement = document.getElementById(`strip${r}`);
                generateReelStrip(stripElement, ['🔥7', '💎', '💰', '🍒']);
                stripElement.style.transform = 'translateY(0px)';
            }
        }

        function startSpin() {
            if (runningSpin) return;

            if (currentBalance < SPIN_COST) {
                messageDisplay.textContent = "عفواً، رصيدك لا يكفي للعب!";
                messageDisplay.className = 'loss-text';
                return;
            }

            runningSpin = true;
            currentBalance -= SPIN_COST;
            balanceDisplay.textContent = currentBalance;
            spinButtonContainer.classList.add('disabled-spin');
            messageDisplay.textContent = "جاري البحث عن السبعات والجواهر... 🔥";
            messageDisplay.className = '';

            // تفعيل صوت التكتكة المتتالي السريع أثناء دوران البكرات
            spinSoundInterval = setInterval(playTickSound, 90);

            const isForcedWin = Math.random() < 0.60; 
            const winningHighSymbols = ['🔥7', '💎', '💰', 'WILD'];
            const luckySymbol = winningHighSymbols[Math.floor(Math.random() * winningHighSymbols.length)];
            const targetWinRow = Math.floor(Math.random() * VISIBLE_ROWS); 

            const finalGridResults = [];

            for (let r = 1; r <= 5; r++) {
                const stripElement = document.getElementById(`strip${r}`);
                
                stripElement.style.transition = 'none';
                stripElement.style.transform = 'translateY(0px)';

                const reelFinalSymbols = [];
                for (let row = 0; row < VISIBLE_ROWS; row++) {
                    if (isForcedWin && row === targetWinRow) {
                        reelFinalSymbols.push(luckySymbol); 
                    } else {
                        reelFinalSymbols.push(SYMBOLS_POOL[Math.floor(Math.random() * SYMBOLS_POOL.length)]);
                    }
                }
                finalGridResults.push(reelFinalSymbols);

                generateReelStrip(stripElement, reelFinalSymbols);

                const travelDistance = -(STRIP_ITEMS_COUNT - VISIBLE_ROWS) * SINGLE_HEIGHT;

                setTimeout(() => {
                    stripElement.style.transition = `transform ${1.5 + (r * 0.2)}s cubic-bezier(0.25, 1, 0.2, 1)`;
                    stripElement.style.transform = `translateY(${travelDistance}px)`;
                }, 50);
            }

            setTimeout(() => {
                // إيقاف صوت التدوير فوراً عند توقف البكرات
                clearInterval(spinSoundInterval);

                let winReward = 0;
                const flatResults = finalGridResults.flat();
                const counts = {};
                flatResults.forEach(sym => { counts[sym] = (counts[sym] || 0) + 1; });

                if (counts['🔥7'] >= 5) winReward += 200;
                else if (counts['🔥7'] >= 3) winReward += 50;

                if (counts['💎'] >= 5) winReward += 150;
                else if (counts['💎'] >= 3) winReward += 40;

                if (counts['WILD'] >= 5) winReward += 100;
                if (counts['💰'] >= 5) winReward += 80;

                Object.keys(counts).forEach(key => {
                    if (counts[key] >= 4 && !winningHighSymbols.includes(key)) {
                        winReward += 30;
                    }
                });

                if (winReward > 0) {
                    currentBalance += winReward;
                    
                    // تشغيل موسيقى الفوز السعيدة فوراً!
                    playWinMelody();

                    let symbolCleanName = luckySymbol === '🔥7' ? 'السبعات النارية' : (luckySymbol === '💎' ? 'الجواهر المشعة' : 'الرموز الفاخرة');
                    if (isForcedWin) {
                        messageDisplay.textContent = `جائزة كبرى! تجمعت ${symbolCleanName} سوية وربحت +${winReward} د.ع 🎉`;
                    } else {
                        messageDisplay.textContent = `فوز رائع! ربحت +${winReward} د.ع 🎉`;
                    }
                    messageDisplay.className = 'win-text';
                } else {
                    messageDisplay.textContent = "حظاً أوفق في السحبة القادمة.";
                    messageDisplay.className = 'loss-text';
                }

                balanceDisplay.textContent = currentBalance;
                spinButtonContainer.classList.remove('disabled-spin');
                runningSpin = false;

            }, 2700); 
        }

        initSlotMachine();
    </script>
</body>
</html>
