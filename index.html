<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اربح بدون ايداع - ماكنة الحظ</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
        }

        h1 { color: #ff9800; margin-bottom: 5px; font-size: 1.8em; }

        .status-panel { background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        #balance { font-weight: bold; color: #4caf50; font-size: 1.3em; }
        .cost-text { color: #aaa; font-size: 0.9em; margin: 5px 0 0 0; }

        .slot-machine {
            display: flex;
            justify-content: space-between;
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #333;
            margin-bottom: 20px;
        }

        .reel {
            width: 75px;
            height: 100px; 
            background-color: white;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .symbol {
            font-size: 3.5em; 
            line-height: 1;
        }

        #spin-button {
            background-color: #ff9800;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        #spin-button:hover { background-color: #e68a00; }

        #message { margin-top: 15px; font-weight: bold; min-height: 1.2em; }
        .win { color: #4caf50; }
        .loss { color: #f44336; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>اربح بدون ايداع</h1>
        
        <div class="status-panel">
            <p style="margin:0;">رصيدك الحالي: <span id="balance">100</span> نقطة</p>
            <p class="cost-text">تكلفة اللفة: 10 نقاط</p>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel1"><div class="symbol">💰</div></div>
            <div class="reel" id="reel2"><div class="symbol">🍇</div></div>
            <div class="reel" id="reel3"><div class="symbol">🍊</div></div>
        </div>

        <button id="spin-button" onclick="spin()">إضغط لتجربة حظك</button>
        <p id="message"></p>
    </div>

    <script>
        const SYMBOLS = ['🍒', '🍋', '🍊', '🍇', '⭐', '💰'];
        const SPIN_COST = 10; 
        let balance = 100; 

        const balanceEl = document.getElementById('balance');
        const messageEl = document.getElementById('message');
        
        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const reel3 = document.getElementById('reel3');

        function spin() {
            if (balance < SPIN_COST) {
                messageEl.textContent = "عفواً، ليس لديك نقاط كافية!";
                messageEl.className = 'loss';
                return;
            }

            // خصم النقاط فوراً من الضغطة
            balance -= SPIN_COST;

            // توليد الأشكال عشوائياً وبنفس الفيمتو ثانية
            const res1 = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            const res2 = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            const res3 = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];

            // تبديل الفواكه على الشاشة فوراً
            reel1.innerHTML = `<div class="symbol">${res1}</div>`;
            reel2.innerHTML = `<div class="symbol">${res2}</div>`;
            reel3.innerHTML = `<div class="symbol">${res3}</div>`;

            // حساب الربح والخسارة
            let winAmount = 0;
            if (res1 === '💰' && res2 === '💰' && res3 === '💰') {
                winAmount = 100;
            } else if (res1 === '⭐' && res2 === '⭐' && res3 === '⭐') {
                winAmount = 50;
            } else if (res1 === res2 && res2 === res3) {
                winAmount = 25;
            } else if (res1 === '🍒' && res2 === '🍒') {
                winAmount = 5;
            }

            if (winAmount > 0) {
                balance += winAmount;
                messageEl.textContent = `مبروك! فزت بـ ${winAmount} نقطة! 🎉`;
                messageEl.className = 'win';
            } else {
                messageEl.textContent = "حظاً أوفق في المرة القادمة.";
                messageEl.className = 'loss';
            }

            // تحديث رصيد الشاشة
            balanceEl.textContent = balance;
        }
    </script>
</body>
</html>
