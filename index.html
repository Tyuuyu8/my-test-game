<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اربح بدون ايداع - Lucky Streak</title>
    <style>
        /* تصميم الخلفية النارية العامة */
        body {
            background: radial-gradient(circle, #4a0000 0%, #150000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* حاوية اللعبة الشاشة الكاملة المحاكية للموبايل بالعرض */
        .game-screen {
            width: 100%;
            max-width: 480px; /* تصميم طولي متناسق مع الموبايل وبداخله السلوت العريض */
            background: #000;
            border: 4px solid #3a0000;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(255, 61, 0, 0.4);
            position: relative;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(40,0,0,0.6)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M50 15 C30 40 30 60 50 95 C70 60 70 40 50 15 Z" fill="%23ff3d00" opacity="0.05"/></svg>');
        }

        /* الشريط العلوي للرصيد */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.4em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3d00, 0 0 5px #ffeb3b;
            font-style: italic;
        }
        .balance-box {
            background: linear-gradient(180deg, #222 0%, #111 100%);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .balance-value {
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
        }
        .plus-btn {
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ماكينة السلوت - الإطار الذهبي الناري */
        .slot-machine-frame {
            border: 4px solid #ff9800;
            border-radius: 12px;
            background: #111;
            padding: 8px;
            box-shadow: 0 0 20px #ff3d00, inset 0 0 15px #000;
            display: flex;
            justify-content: space-between;
            gap: 4px;
            overflow: hidden;
            position: relative;
        }

        /* البكرات الـ 5 */
        .reel {
            flex: 1;
            height: 240px; /* يعرض 4 صفوف (كل صف 60px) */
            background: linear-gradient(180deg, #151515 0%, #050505 50%, #151515 100%);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border-right: 1px solid #222;
        }

        .symbols-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* الرموز والـ 7️⃣ النارية */
        .symbol {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        
        .symbol.seven {
            color: #ff3d00;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3d00, 0 0 5px #ffd700;
            animation: pulse 1s infinite alternate;
        }

        .blur-motion {
            filter: blur(2px);
        }

        /* شريط التحكم السفلي والأزرار */
        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }

        /* زر SPIN الدائري الكبير الاحترافي */
        .spin-outer-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9800 0%, #ff3d00 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px #ff3d00, 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }
        .spin-outer-ring:active {
            transform: scale(0.95);
        }
        .spin-inner-circle {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 1px;
            border: 3px solid #111;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        
        .disabled-spin {
            background: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
        .disabled-spin .spin-inner-circle {
            background: #aaa;
            color: #555;
        }

        /* لوحة البيانات السفلية المتكاملة */
        .bottom-info-bar {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid #333;
            padding: 8px 5px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #aaa;
            border-radius: 5px;
        }
        .info-item span {
            color: #ffd700;
            font-weight: bold;
        }

        #message-display {
            font-weight: bold;
            text-align: center;
            min-height: 1.5em;
            font-size: 1.1em;
            margin-top: 5px;
        }
        .win-text { color: #4caf50; text-shadow: 0 0 10px rgba(76,175,80,0.5); }
        .loss-text { color: #f44336; }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <div class="game-screen">
        <div class="top-navbar">
            <div class="game-title">Lucky Streak 🔥</div>
            <div class="balance-box">
                <span style="color:#ffd700; font-size:0.8em;">د.ع</span>
                <span class="balance-value" id="user-balance">1000</span>
                <button class="plus-btn">+</button>
            </div>
        </div>

        <div class="slot-machine-frame">
            <div class="reel"><div class="symbols-strip" id="strip1"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip2"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip3"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip4"></div></div>
            <div class="reel"><div class="symbols-strip" id="strip5"></div></div>
        </div>

        <div id="message-display">تحجّج بحظك واضغط لتدوير النار!</div>

        <div class="controls-panel">
            <div class="spin-outer-ring" id="spin-btn-container" onclick="startSpin()">
                <div class="spin-inner-circle">SPIN</div>
            </div>

            <div class="bottom-info-bar">
                <div class="info-item">BET: <span id="bet-val">10</span></div>
                <div class="info-item">LINES: <span>10</span></div>
                <div class="info-item">COIN VALUE: <span>$0.01</span></div>
            </div>
        </div>
    </div>

    <script>
        // الرموز الفاخرة؛ الـ 7️⃣ هي رمز الجائزة الكبرى
        const SYMBOLS_POOL = ['🔥7', '🍒', '🍋', '🍊', '🍇', '💎', '💰', 'WILD'];
        const SPIN_COST = 10;
        const SINGLE_HEIGHT = 60; // ارتفاع الرمز بالبكسل
        const VISIBLE_ROWS = 4;   // عدد الصفوف الظاهرة
        const STRIP_ITEMS_COUNT = 30; // طول شريط الأنيميشن

        let currentBalance = 1000;
        let runningSpin = false;

        const balanceDisplay = document.getElementById('user-balance');
        const messageDisplay = document.getElementById('message-display');
        const spinButtonContainer = document.getElementById('spin-btn-container');

        // دالة لإنشاء شريط الرموز الممتد عمودياً لكل بكرة
        function generateReelStrip(targetStrip, finalFourSymbols) {
            let html = '';
            // نملأ أول الشريط برموز عشوائية للحركة السريعة
            for (let i = 0; i < STRIP_ITEMS_COUNT - VISIBLE_ROWS; i++) {
                const randSym = SYMBOLS_POOL[Math.floor(Math.random() * SYMBOLS_POOL.length)];
                if (randSym === '🔥7') {
                    html += `<div class="symbol seven">7</div>`;
                } else {
                    html += `<div class="symbol">${randSym}</div>`;
                }
            }
            // نضع الـ 4 رموز النهائية المستهدفة في آخر الشريط
            finalFourSymbols.forEach(sym => {
                if (sym === '🔥7') {
                    html += `<div class="symbol seven">7</div>`;
                } else {
                    html += `<div class="symbol">${sym}</div>`;
                }
            });
            targetStrip.innerHTML = html;
        }

        // تهيئة البكرات الـ 5 عند فتح الصفحة بأشكال افتراضية ثابته
        function initSlotMachine() {
            for (let r = 1; r <= 5; r++) {
                const stripElement = document.getElementById(`strip${r}`);
                const defaultSymbols = ['🔥7', '🍒', '🍋', '🍊'];
                generateReelStrip(stripElement, defaultSymbols);
                stripElement.style.transform = 'translateY(0px)';
            }
        }

        function startSpin() {
            if (runningSpin) return;

            if (currentBalance < SPIN_COST) {
                messageDisplay.textContent = "عفواً، رصيدك لا يكفي للعب!";
                messageDisplay.className = 'loss-text';
                return;
            }

            // سحب الرصيد وتحديث الواجهة وقفل الزر
            runningSpin = true;
            currentBalance -= SPIN_COST;
            balanceDisplay.textContent = currentBalance;
            spinButtonContainer.classList.add('disabled-spin');
            messageDisplay.textContent = "جاري تدوير بكرات الحظ... 🔥";
            messageDisplay.className = '';

            // مصفوفة لحفظ النواتج النهائية الـ 4 لكل بكرة من البكرات الـ 5
            const finalGridResults = [];

            for (let r = 1; r <= 5; r++) {
                const stripElement = document.getElementById(`strip${r}`);
                
                // صيانة المسار وتصفير الأنيميشن فوراً بدون تأثير بصري متأخر
                stripElement.style.transition = 'none';
                stripElement.style.transform = 'translateY(0px)';

                // اختيار 4 رموز عشوائية نهائية لهذه البكرة
                const reelFinalSymbols = [];
                for (let row = 0; row < VISIBLE_ROWS; row++) {
                    reelFinalSymbols.push(SYMBOLS_POOL[Math.floor(Math.random() * SYMBOLS_POOL.length)]);
                }
                finalGridResults.push(reelFinalSymbols);

                // بناء الشريط الجديد الممتد
                generateReelStrip(stripElement, reelFinalSymbols);
                stripElement.classList.add('blur-motion');

                // حساب مسافة التحرك العمودي للأعلى لإظهار آخر 4 عناصر
                const travelDistance = -(STRIP_ITEMS_COUNT - VISIBLE_ROWS) * SINGLE_HEIGHT;

                // تشغيل الدوران السلس بفارق توقيت تدريجي بين البكرات (Stagger effect) مثل السلوت الحقيقي
                setTimeout(() => {
                    stripElement.style.transition = `transform ${1.8 + (r * 0.2)}s cubic-bezier(0.25, 0.8, 0.1, 1)`;
                    stripElement.style.transform = `translateY(${travelDistance}px)`;
                }, 50);
            }

            // إيقاف الدوران وعرض النتيجة الإجمالية بعد انتهاء آخر بكرة (تقريباً 3 ثوانٍ)
            setTimeout(() => {
                for (let r = 1; r <= 5; r++) {
                    document.getElementById(`strip${r}`).classList.remove('blur-motion');
                }

                // دالة فحص الفوز البسيطة (إذا تكرر الرمز 3 مرات أو أكثر في الواجهة يربح)
                let winReward = 0;
                const flatResults = finalGridResults.flat();
                const counts = {};
                
                flatResults.forEach(sym => { counts[sym] = (counts[sym] || 0) + 1; });

                // قواعد الربح الاحتفالية:
                if (counts['🔥7'] >= 3) winReward += 100;
                if (counts['WILD'] >= 3) winReward += 80;
                if (counts['💰'] >= 4) winReward += 50;
                if (counts['💎'] >= 4) winReward += 40;

                // إذا طلع تكرار لأي فاكهة عادية أكثر من 4 مرات
                Object.keys(counts).forEach(key => {
                    if (counts[key] >= 4 && key !== '🔥7' && key !== 'WILD') {
                        winReward += 20;
                    }
                });

                // معالجة النتيجة النهائية للمستخدم
                if (winReward > 0) {
                    currentBalance += winReward;
                    messageDisplay.textContent = `فوز ساحق! ربحت +${winReward} د.ع 🎉`;
                    messageDisplay.className = 'win-text';
                } else {
                    messageDisplay.textContent = "حظاً أوفق في السحبة القادمة.";
                    messageDisplay.className = 'loss-text';
                }

                // تحديث البيانات النهائية وإعادة تشغيل الأزرار
                balanceDisplay.textContent = currentBalance;
                spinButtonContainer.classList.remove('disabled-spin');
                runningSpin = false;

            }, 3000);
        }

        // انطلاق اللعبة لأول مرة
        initSlotMachine();
    </script>
</body>
</html>
